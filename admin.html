<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>Admin Menu</h2>
        <a href="#users">Manage Users</a>
        <a href="#courses">Manage Courses</a>
        <a href="#students">Manage Students</a>
        <a href="#faculty">Manage Faculty</a>
        <a href="#" id="logout">Logout</a>
    </nav>
    <div class="main-content">
        <h1>Admin Dashboard</h1>
        <div id="users" class="section">
            <h2>Users</h2>
            <ul id="usersList"></ul>
            <button id="addUserBtn">Add User</button>
        </div>
        <div id="courses" class="section hidden">
            <h2>Courses</h2>
            <ul id="coursesList"></ul>
            <input type="text" id="courseName" placeholder="Course Name">
            <button id="addCourseBtn">Add Course</button>
        </div>
        <div id="students" class="section hidden">
            <h2>Students</h2>
            <ul id="studentsList"></ul>
            <button id="addStudentBtn">Add Student</button>
        </div>
        <div id="faculty" class="section hidden">
            <h2>Faculty</h2>
            <ul id="facultyList"></ul>
            <button id="addFacultyBtn">Add Faculty</button>
        </div>
        <div id="notification" class="notification hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
